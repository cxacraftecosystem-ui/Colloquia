name: CI

# Build/lint checks on every push & PR. No secrets needed; does not touch the DB or AWS.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + import-check + lint
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff
          python -m prisma generate --schema=prisma/schema.prisma
          python -c "import app.main; print('backend imports OK')"
          ruff check app || true

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Assemble debug APK
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "apiBaseUrl=http://10.0.2.2:8010/api/" >> local.properties
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
