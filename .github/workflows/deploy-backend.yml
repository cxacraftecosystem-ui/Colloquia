name: Deploy backend to EC2

# Auto-deploys the FastAPI backend to the EC2 box on every push to main that touches the backend.
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   EC2_HOST       Elastic IP of the API box (terraform output api_public_ip)
#   EC2_SSH_KEY    contents of infra/terraform/colloquia-deploy.pem (the generated private key)
#   BACKEND_ENV    the full backend/.env contents (DATABASE_URL, JWT_SECRET, AWS_* keys, OPENAI_API_KEY,
#                  DEEPGRAM_API_KEY, GOOGLE_CLIENT_ID, BACKEND_CORS_ORIGINS, LITE_MODE, ...)
# Nothing secret lives in this file.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start ssh-agent with the deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to the server
        run: |
          rsync -az --delete \
            --exclude '.venv' --exclude '__pycache__' --exclude '*.pyc' \
            ./backend/ ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/backend/

      - name: Write .env on the server
        run: |
          printf '%s' "$BACKEND_ENV" | ssh ubuntu@${{ secrets.EC2_HOST }} \
            'cat > /home/ubuntu/app/backend/.env && chmod 600 /home/ubuntu/app/backend/.env'
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}

      - name: Write FCM service-account JSON on the server (for push, HTTP v1)
        run: |
          if [ -n "$FCM_JSON" ]; then
            printf '%s' "$FCM_JSON" | ssh ubuntu@${{ secrets.EC2_HOST }} \
              'cat > /home/ubuntu/app/backend/fcm-service-account.json && chmod 600 /home/ubuntu/app/backend/fcm-service-account.json'
          else
            echo "No FCM_SERVICE_ACCOUNT_JSON secret; skipping push setup."
          fi
        env:
          FCM_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}

      - name: Install deps, refresh systemd units, create/sync tables, restart
        run: |
          ssh ubuntu@${{ secrets.EC2_HOST }} 'bash -s' <<'REMOTE'
          set -euxo pipefail
          cd /home/ubuntu/app/backend
          if [ ! -d .venv ]; then python3.12 -m venv .venv; fi
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -e .
          PATH="$PWD/.venv/bin:$PATH" ./.venv/bin/python -m prisma generate

          # --- Refresh systemd units so an already-provisioned box gets the pooler fix --------------
          # The box was first provisioned with uvicorn --workers 2 and the queue running in-process.
          # That multiprocess supervisor SIGKILLs a worker whose health-ping is starved by a heavy
          # transcription chunk, orphaning its Prisma query-engine and eventually exhausting the
          # Supabase pooler (HTTP 500 on every DB call). Fix = ONE uvicorn worker + a SEPARATE queue
          # service + KillMode=control-group. Written here (not only in terraform) so existing boxes
          # are repaired on the next deploy without re-provisioning.
          sudo tee /etc/systemd/system/colloquia.service >/dev/null <<'UNIT'
          [Unit]
          Description=TranscriptAI (Colloquia) API
          After=network.target
          [Service]
          User=ubuntu
          WorkingDirectory=/home/ubuntu/app/backend
          EnvironmentFile=/home/ubuntu/app/backend/.env
          Environment=MEDIA_QUEUE_WORKER_ENABLED=false
          ExecStart=/home/ubuntu/app/backend/.venv/bin/python -m uvicorn app.main:app --host 127.0.0.1 --port 8010 --workers 1
          Restart=always
          RestartSec=10
          KillMode=control-group
          TimeoutStopSec=20
          [Install]
          WantedBy=multi-user.target
          UNIT
          sudo tee /etc/systemd/system/colloquia-queue.service >/dev/null <<'UNIT'
          [Unit]
          Description=TranscriptAI (Colloquia) media queue worker
          After=network.target
          [Service]
          User=ubuntu
          WorkingDirectory=/home/ubuntu/app/backend
          EnvironmentFile=/home/ubuntu/app/backend/.env
          ExecStart=/home/ubuntu/app/backend/.venv/bin/python -m app.worker
          Restart=always
          RestartSec=10
          KillMode=control-group
          TimeoutStopSec=30
          [Install]
          WantedBy=multi-user.target
          UNIT
          sudo systemctl daemon-reload
          sudo systemctl enable colloquia colloquia-queue || true

          # Stop the web app first so it releases its pooler sessions before we run DDL, then create
          # the ta_* tables additively (idempotent; errors on already-existing tables are ignored).
          sudo systemctl stop colloquia colloquia-queue || true
          sleep 3
          if [ -f prisma/create_tables.sql ]; then
            PATH="$PWD/.venv/bin:$PATH" ./.venv/bin/python -m prisma db execute --schema=prisma/schema.prisma --file prisma/create_tables.sql || true
          fi
          if [ -f prisma/phase2_tables.sql ]; then
            PATH="$PWD/.venv/bin:$PATH" ./.venv/bin/python -m prisma db execute --schema=prisma/schema.prisma --file prisma/phase2_tables.sql || true
          fi
          if [ -f prisma/app_release_table.sql ]; then
            PATH="$PWD/.venv/bin:$PATH" ./.venv/bin/python -m prisma db execute --schema=prisma/schema.prisma --file prisma/app_release_table.sql || true
          fi
          if [ -f prisma/alter_transcript_translated.sql ]; then
            PATH="$PWD/.venv/bin:$PATH" ./.venv/bin/python -m prisma db execute --schema=prisma/schema.prisma --file prisma/alter_transcript_translated.sql || true
          fi

          sudo systemctl restart colloquia
          sudo systemctl restart colloquia-queue
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8010/health >/dev/null 2>&1; then echo "healthy after ${i} tries"; break; fi
            if [ "$i" = "40" ]; then echo "service did not become healthy:"; sudo journalctl -u colloquia -n 80 --no-pager; exit 1; fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8010/health
          REMOTE
